[pytest]
# Configuração do pytest

# Diretório de testes
testpaths = tests

# Python files
python_files = test_*.py

# Test functions
python_functions = test_*

# Test classes
python_classes = Test*

# Markers
markers =
    unit: testes unitários
    integration: testes de integração
    performance: testes de performance
    security: testes de segurança
    slow: testes lentos
    fast: testes rápidos

# Mínimo de Python version
minversion = 7.0

# Output options
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (quando usado com pytest-cov)
# addopts = --cov=app --cov-report=html --cov-report=term-missing

# Timeout para testes (segundos)
timeout = 300

# Asyncio mode
asyncio_mode = auto
